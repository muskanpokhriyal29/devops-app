name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 216874796831.dkr.ecr.eu-central-1.amazonaws.com

      - name: Build Docker Image
        run: docker build -t devops-app:latest -f app/Dockerfile app/

      - name: Tag Image
        run: docker tag devops-app:latest 216874796831.dkr.ecr.eu-central-1.amazonaws.com/devops-app-repo:latest

      - name: Push to ECR
        run: docker push 216874796831.dkr.ecr.eu-central-1.amazonaws.com/devops-app-repo:latest